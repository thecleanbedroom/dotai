# .air.toml — Air hot-reload config for mcp-gemini-gateway
# Install: go install github.com/air-verse/air@latest
# Usage:   cd .agent/mcp/mcp-gemini-gateway && air

root = "."
tmp_dir = "tmp"

[build]
  env_files = [".env"]
  bin = "tmp/mcp-gemini-gateway --http"
  cmd = "go build -o tmp/mcp-gemini-gateway ./cmd/mcp-gemini-gateway"
  delay = 1000
  exclude_dir = ["data", "tmp", "vendor"]
  exclude_file = []
  exclude_regex = ["_test\\.go$"]
  exclude_unchanged = true
  follow_symlink = false
  include_ext = ["go", "toml"]
  include_dir = []
  kill_delay = "1s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = true

[misc]
  clean_on_exit = true

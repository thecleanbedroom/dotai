root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = ["--http"]
  bin = "tmp/mcp-project-memory"
  cmd = "go build -o ./tmp/mcp-project-memory ./cmd/mcp-project-memory"
  delay = 1000
  exclude_dir = ["data", "tmp", "vendor"]
  exclude_regex = ["_test.go$"]
  include_ext = ["go", "toml", "env"]
  kill_delay = "2s"
  send_interrupt = true

[log]
  time = false

[misc]
  clean_on_exit = true
